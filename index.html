<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket TON Casino</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #c4ff00; --text: #fff; --gray: #777; --blue: #00a3ff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #000; }
        .user-info { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #222; border: 1px solid #333; }
        .balance-pill { background: #1a1a1a; padding: 6px 14px; border-radius: 20px; display: flex; align-items: center; gap: 6px; border: 1px solid #222; font-weight: 800; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-view { flex: 1; position: relative; overflow-y: auto; padding: 0 15px 80px 15px; } /* Отступ снизу под меню */
        .page { display: none; width: 100%; max-width: 500px; margin: 0 auto; }
        .page.active { display: block; }

        /* ИГРА */
        .game-window { position: relative; width: 100%; height: 260px; background: #080808; border-radius: 24px; border: 1px solid #1a1a1a; overflow: hidden; margin-top: 10px; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .mult-overlay { position: absolute; top: 50%; left: 30px; transform: translateY(-50%); z-index: 5; pointer-events: none; }
        #multiplier { font-size: 52px; font-weight: 900; color: var(--accent); text-shadow: 0 0 20px rgba(196, 255, 0, 0.4); }

        /* ИСТОРИЯ КЭФОВ */
        .history-bar { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; scrollbar-width: none; }
        .h-item { padding: 8px 16px; background: #181818; border-radius: 12px; font-size: 14px; font-weight: bold; color: var(--gray); min-width: 60px; text-align: center; border: 1px solid #222; }
        .h-item.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* КНОПКА СТАВКИ */
        .btn-bet { background: var(--accent); color: #000; border: none; padding: 18px; width: 100%; border-radius: 16px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.1s; }
        .btn-bet:active { transform: scale(0.96); }
        .btn-bet:disabled { background: #222; color: #444; }

        /* СПИСОК ИГРОКОВ */
        .players-list { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; }
        .p-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .p-res { font-weight: 900; color: var(--accent); }

        /* НИЖНЕЕ МЕНЮ (ВКЛАДКИ) */
        .nav-tabs { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #151515; z-index: 100; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray); font-size: 10px; font-weight: bold; cursor: pointer; }
        .tab-item.active { color: var(--accent); }
        .tab-icon { font-size: 20px; margin-bottom: 2px; }

        /* ПРОФИЛЬ */
        .profile-card { background: var(--panel); padding: 30px; border-radius: 24px; text-align: center; margin-top: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 14px; text-align: center; font-size: 16px; outline: none; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: var(--panel); padding: 30px; border-radius: 24px; width: 300px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="user-info">
        <div class="avatar"></div>
        <span id="top-nick">Player...</span>
    </div>
    <div class="balance-pill">
        <span style="color:var(--blue)">💎</span>
        <span id="user-balance">0.00</span>
    </div>
</div>

<div class="main-view">
    <!-- СТРАНИЦА CRASH -->
    <div id="page-crash" class="page active">
        <div class="game-window">
            <canvas id="gridLayer"></canvas>
            <canvas id="rocketLayer"></canvas>
            <div class="mult-overlay">
                <div id="multiplier">x1.00</div>
            </div>
        </div>
        <div class="history-bar" id="history">
            <div class="h-item active">Waiting</div>
        </div>
        <button id="betBtn" class="btn-bet">Waiting for bets</button>
        <div class="players-list" id="players"></div>
    </div>

    <!-- СТРАНИЦА ПРОФИЛЯ -->
    <div id="page-profile" class="page">
        <div class="profile-card">
            <h2 style="margin:0 0 10px 0">Профиль</h2>
            <p style="color:var(--gray); font-size: 14px;">Ваш никнейм: <b id="prof-nick" style="color:#fff"></b></p>
            <input type="text" id="nick-input" placeholder="Введите новый ник...">
            <button onclick="saveNick()" class="btn-bet">СОХРАНИТЬ</button>
        </div>
    </div>
</div>

<!-- ФИКСИРОВАННЫЕ ВКЛАДКИ -->
<div class="nav-tabs">
    <div class="tab-item" onclick="alert('Soon!')"><span class="tab-icon">🎮</span>Games</div>
    <div class="tab-item active" id="tab-crash" onclick="switchTab('crash')"><span class="tab-icon">🚀</span>Crash</div>
    <div class="tab-item" id="tab-profile" onclick="switchTab('profile')"><span class="tab-icon">👤</span>Profile</div>
</div>

<div id="betModal" class="modal">
    <div class="modal-box">
        <h3 style="margin-top:0">Сумма ставки</h3>
        <input type="number" id="betAmt" value="10" step="1">
        <button id="confirmBet" class="btn-bet">ПОСТАВИТЬ</button>
        <p onclick="closeM()" style="color:var(--gray); cursor:pointer; margin-top:20px; font-size:14px;">Закрыть</p>
    </div>
</div>

<script>
    const socket = io();

    // 1. ГЕНЕРАЦИЯ НИКА
    let myNick = "Player" + Math.floor(100 + Math.random() * 899);
    document.getElementById('top-nick').innerText = myNick;
    document.getElementById('prof-nick').innerText = myNick;
    socket.emit('join', { name: myNick });

    // 2. НАВИГАЦИЯ
    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
        if(id === 'crash') resize();
    }

    function saveNick() {
        const val = document.getElementById('nick-input').value;
        if(val) {
            myNick = val;
            socket.emit('join', { name: val });
            document.getElementById('top-nick').innerText = val;
            document.getElementById('prof-nick').innerText = val;
            alert('Ник изменен!');
            switchTab('crash');
        }
    }

    // 3. ГРАФИКА
    const rCan = document.getElementById('rocketLayer');
    const gCan = document.getElementById('gridLayer');
    const rCtx = rCan.getContext('2d');
    const gCtx = gCan.getContext('2d');

    let targetM = 1.00, visualM = 1.00, state = 'WAIT', isBet = false;

    function resize() {
        rCan.width = gCan.width = rCan.parentElement.clientWidth;
        rCan.height = gCan.height = 260;
        gCtx.clearRect(0,0,gCan.width,260);
        gCtx.strokeStyle = '#151515';
        for(let x=0; x<gCan.width; x+=30) { gCtx.beginPath(); gCtx.moveTo(x,0); gCtx.lineTo(x,260); gCtx.stroke(); }
        for(let y=0; y<260; y+=30) { gCtx.beginPath(); gCtx.moveTo(0,y); gCtx.lineTo(gCan.width,y); gCtx.stroke(); }
    }

    function drawRocket(x, y, angle) {
        rCtx.save();
        rCtx.translate(x, y);
        rCtx.rotate(angle);
        rCtx.fillStyle = '#ff9100'; // Огонь
        let f = 7 + Math.random() * 8;
        rCtx.beginPath(); rCtx.moveTo(-15, 0); rCtx.lineTo(-15-f, -4); rCtx.lineTo(-15-f, 4); rCtx.fill();
        rCtx.fillStyle = '#fff'; // Тело
        rCtx.beginPath(); rCtx.ellipse(0, 0, 18, 7, 0, 0, Math.PI*2); rCtx.fill();
        rCtx.fillStyle = '#c4ff00'; // Нос
        rCtx.beginPath(); rCtx.moveTo(12, -6); rCtx.quadraticCurveTo(24, 0, 12, 6); rCtx.fill();
        rCtx.restore();
    }

    function loop() {
        rCtx.clearRect(0,0,rCan.width,260);
        if(state === 'FLY') {
            visualM += (targetM - visualM) * 0.1;
            let p = Math.min((visualM - 1) / 15, 1);
            let x = 60 + (p * (rCan.width - 150));
            let y = 220 - (Math.pow(p, 0.7) * 180);
            let h = Math.sin(Date.now()/250) * 2;
            rCtx.beginPath(); rCtx.strokeStyle = '#c4ff00'; rCtx.lineWidth = 3;
            rCtx.moveTo(60, 220); rCtx.quadraticCurveTo(x/2+30, 220, x, y+h); rCtx.stroke();
            drawRocket(x, y+h, -0.4);
        }
        requestAnimationFrame(loop);
    }

    // 4. СОКЕТЫ
    socket.on('tick', d => {
        const m = document.getElementById('multiplier');
        if(d.timer) { m.innerText = d.timer + 's'; m.style.color = '#fff'; }
        else { targetM = parseFloat(d.multiplier); m.innerText = 'x' + d.multiplier; m.style.color = '#c4ff00'; }
    });

    socket.on('gameState', d => {
        state = d.state;
        const b = document.getElementById('betBtn');
        if(state === 'WAIT') {
            b.innerText = 'Waiting for bets'; b.disabled = false; isBet = false;
            document.getElementById('players').innerHTML = '';
        } else if(state === 'FLY') {
            if(isBet) { b.innerText = 'CASH OUT'; b.disabled = false; }
            else { b.innerText = 'Waiting...'; b.disabled = true; }
        } else if(state === 'CRASH') {
            b.innerText = 'CRASHED'; b.disabled = true;
            updateHist(d.history);
        }
    });

    socket.on('updateBalance', d => document.getElementById('user-balance').innerText = d.balance.toFixed(2));

    socket.on('playerAction', d => {
        const list = document.getElementById('players');
        if(d.type === 'bet') {
            const row = document.createElement('div');
            row.className = 'player-row'; row.id = 'p-' + d.name;
            row.innerHTML = `<div class="p-name"><div class="avatar" style="width:24px; height:24px"></div>${d.name} <span style="color:var(--blue)">💎 ${d.bet}</span></div><div class="p-res"></div>`;
            list.prepend(row);
        }
        if(d.type === 'cashout') {
            const target = document.getElementById('p-' + d.name);
            if(target) target.querySelector('.p-res').innerText = 'x' + d.mult;
        }
    });

    document.getElementById('betBtn').onclick = () => {
        if(state === 'WAIT' && !isBet) document.getElementById('betModal').style.display='flex';
        else if(state === 'FLY' && isBet) { socket.emit('cashOut'); isBet = false; }
    };

    document.getElementById('confirmBet').onclick = () => {
        socket.emit('placeBet', { bet: document.getElementById('betAmt').value });
        isBet = true; document.getElementById('betBtn').innerText = 'BET PLACED';
        document.getElementById('betBtn').disabled = true; closeM();
    };

    function updateHist(list) {
        const h = document.getElementById('history'); h.innerHTML = '<div class="h-item active">Waiting</div>';
        list.slice(0, 6).forEach(v => {
            const i = document.createElement('div'); i.className = 'h-item';
            i.innerText = v + 'x'; h.appendChild(i);
        });
    }

    function closeM() { document.getElementById('betModal').style.display='none'; }
    window.onload = () => { resize(); loop(); };
</script>
</body>
</html>
