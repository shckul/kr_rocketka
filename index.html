<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash TON Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #14171a;
            --accent: #c8ff00; /* Кислотно-желтый */
            --text: #ffffff;
            --gray: #5e6673;
            --red: #ff4d4d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; background: #2b2f36; border-radius: 50%; }
        .balance { background: #1e2329; padding: 5px 15px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* Игровое поле */
        .game-container {
            position: relative;
            background: var(--card);
            margin: 0 10px;
            height: 260px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #2b2f36;
            background-image: radial-gradient(circle at 50% 50%, #1a1d21 0%, #14171a 100%);
        }

        #multiplier { font-size: 3.5rem; font-weight: 800; z-index: 2; transition: transform 0.1s; }
        #game-status { color: var(--gray); font-weight: bold; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .crashed-text { color: var(--red) !important; }

        /* История */
        .history-bar {
            display: flex;
            gap: 8px;
            padding: 15px 10px;
            overflow-x: hidden;
        }
        .hist-item {
            background: #1e2329;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            color: #bdc2c9;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Кнопка управления */
        .action-area { padding: 0 10px 15px; }
        .main-btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-waiting { background: var(--accent); color: #000; }
        .btn-placed { background: #2b2f36; color: var(--gray); cursor: default; }
        .btn-cashout { background: #ffffff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* Список игроков */
        .players-section {
            flex-grow: 1;
            background: #0f1216;
            margin: 0 10px;
            border-radius: 20px 20px 0 0;
            padding: 15px;
            overflow-y: auto;
        }
        .player-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1a1d21;
            font-size: 14px;
        }
        .p-name { display: flex; align-items: center; gap: 8px; }
        .p-bet { color: var(--accent); font-weight: bold; }

        /* Таббар */
        .tab-bar {
            display: flex;
            justify-content: space-around;
            padding: 12px 0 25px;
            background: var(--card);
            border-top: 1px solid #2b2f36;
        }
        .tab-item { color: var(--gray); text-align: center; font-size: 11px; cursor: pointer; }
        .tab-item.active { color: var(--accent); }
        .tab-icon { font-size: 20px; margin-bottom: 4px; display: block; }

        /* Модалка */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
        }
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e2329;
            width: 85%;
            padding: 25px;
            border-radius: 24px;
            z-index: 101;
            display: none;
        }
        .modal h3 { margin-top: 0; text-align: center; }
        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: #0b0e11;
            border: 1px solid #2b2f36;
            color: #fff;
            border-radius: 12px;
            font-size: 18px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Вкладка Профиля */
        #profile-page {
            display: none;
            padding: 20px;
            flex-direction: column;
            gap: 20px;
        }
        .profile-card { background: var(--card); padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <!-- Вкладка Игры -->
    <div id="game-page" style="display: flex; flex-direction: column; height: 100%;">
        <div class="header">
            <div class="user-info">
                <div class="avatar"></div>
                <div id="display-name" style="font-weight: bold;">Player</div>
            </div>
            <div class="balance">
                <span style="color: #4c94ff;">💎</span>
                <span id="user-balance">0.00</span>
            </div>
        </div>

        <div class="game-container">
            <div id="multiplier">x1.00</div>
            <div id="game-status">Waiting for bets</div>
        </div>

        <div class="history-bar" id="history"></div>

        <div class="action-area">
            <button id="mainBtn" class="main-btn btn-waiting" onclick="handleBtnClick()">Waiting for bets</button>
        </div>

        <div class="players-section">
            <div style="font-size: 12px; color: var(--gray); margin-bottom: 10px;">LIVE BETS</div>
            <div id="players-list"></div>
        </div>
    </div>

    <!-- Вкладка Профиля -->
    <div id="profile-page">
        <h2>Настройки профиля</h2>
        <div class="profile-card">
            <label>Изменить никнейм:</label>
            <input type="text" id="nameInput" placeholder="Введите имя...">
            <button class="main-btn btn-waiting" onclick="updateProfile()">Сохранить</button>
        </div>
    </div>

    <!-- Навигация -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('game')">
            <span class="tab-icon">🚀</span> Crash
        </div>
        <div class="tab-item" onclick="switchTab('profile')">
            <span class="tab-icon">👤</span> Profile
        </div>
    </div>

    <!-- Модалка ставки -->
    <div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="betModal">
        <h3>Установить ставку</h3>
        <input type="number" id="betInput" placeholder="0.00" step="0.01">
        <button class="main-btn btn-waiting" onclick="confirmBet()">Place Bet</button>
        <div style="text-align: center; margin-top: 15px; color: var(--gray);" onclick="closeModal()">Закрыть</div>
    </div>

<script>
    const socket = io();
    let currentStatus = 'WAIT';
    let hasBetForCurrentRound = false;
    let hasBetForNextRound = false;

    // --- Логика Socket.io ---

    socket.on('gameState', (data) => {
        currentStatus = data.state;
        updateUI();
        if (data.history) updateHistory(data.history);
        
        if (data.state === 'WAIT') {
            // Если была ставка "на следующий раунд", она становится активной
            if (hasBetForNextRound) {
                hasBetForCurrentRound = true;
                hasBetForNextRound = false;
            } else {
                hasBetForCurrentRound = false;
            }
            document.getElementById('players-list').innerHTML = ''; // Чистим список
            updateUI();
        }
    });

    socket.on('tick', (data) => {
        const multEl = document.getElementById('multiplier');
        const statusEl = document.getElementById('game-status');
        
        if (currentStatus === 'WAIT') {
            multEl.innerText = `x1.00`;
            statusEl.innerText = `Starting in ${data.timer}s`;
        } else if (currentStatus === 'FLY') {
            multEl.innerText = `x${data.multiplier}`;
            statusEl.innerText = `Rocket is flying`;
            multEl.style.transform = `scale(${1 + data.multiplier * 0.02})`;
        }
    });

    socket.on('playerAction', (data) => {
        const list = document.getElementById('players-list');
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `<div class="p-name"><div class="avatar" style="width:20px;height:20px"></div> ${data.name}</div>
                         <div class="p-bet">💎 ${data.bet}</div>`;
        list.prepend(row);
    });

    // --- Управление UI ---

    function updateUI() {
        const btn = document.getElementById('mainBtn');
        const multEl = document.getElementById('multiplier');
        const statusEl = document.getElementById('game-status');

        btn.className = 'main-btn'; // Сброс классов

        if (currentStatus === 'WAIT') {
            multEl.classList.remove('crashed-text');
            if (hasBetForCurrentRound || hasBetForNextRound) {
                btn.innerText = "BET PLACED";
                btn.classList.add('btn-placed');
            } else {
                btn.innerText = "Waiting for bets";
                btn.classList.add('btn-waiting');
            }
        } 
        
        else if (currentStatus === 'FLY') {
            if (hasBetForCurrentRound) {
                btn.innerText = "CASH OUT";
                btn.classList.add('btn-cashout');
            } else if (hasBetForNextRound) {
                btn.innerText = "PLACED FOR NEXT";
                btn.classList.add('btn-placed');
            } else {
                btn.innerText = "Wait for next round";
                btn.classList.add('btn-placed');
            }
        } 
        
        else if (currentStatus === 'CRASH') {
            multEl.classList.add('crashed-text');
            statusEl.innerText = "Crashed!";
            btn.innerText = "Boom!";
            btn.classList.add('btn-placed');
        }
    }

    function handleBtnClick() {
        if (currentStatus === 'WAIT') {
            if (!hasBetForCurrentRound) openModal();
        } else if (currentStatus === 'FLY') {
            if (hasBetForCurrentRound) {
                socket.emit('cashOut');
                hasBetForCurrentRound = false;
                updateUI();
            } else if (!hasBetForNextRound) {
                openModal(); // Ставка в полете на след. раунд
            }
        }
    }

    function confirmBet() {
        const amount = document.getElementById('betInput').value;
        if (amount > 0) {
            socket.emit('placeBet', { bet: amount });
            if (currentStatus === 'WAIT') hasBetForCurrentRound = true;
            else hasBetForNextRound = true;
            closeModal();
            updateUI();
        }
    }

    function updateHistory(history) {
        const hDiv = document.getElementById('history');
        hDiv.innerHTML = history.map(val => `<div class="hist-item">${val}x</div>`).join('');
    }

    // --- Навигация и Профиль ---

    function switchTab(tab) {
        document.getElementById('game-page').style.display = tab === 'game' ? 'flex' : 'none';
        document.getElementById('profile-page').style.display = tab === 'profile' ? 'flex' : 'none';
        document.querySelectorAll('.tab-item').forEach((el, i) => {
            el.classList.toggle('active', (tab === 'game' && i === 0) || (tab === 'profile' && i === 1));
        });
    }

    function updateProfile() {
        const newName = document.getElementById('nameInput').value;
        if (newName) {
            socket.emit('join', { name: newName });
            document.getElementById('display-name').innerText = newName;
            alert('Никнейм изменен!');
        }
    }

    function openModal() {
        document.getElementById('betModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('betModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>
</body>
</html>
