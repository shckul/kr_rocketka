<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Elite</title>
    <script src="https://cdn.socket.io"></script>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff;
            --win: #238636; --loss: #da3633; --text: #c9d1d9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Шапка */
        header { display: flex; justify-content: space-between; padding: 10px 20px; background: var(--card); border-bottom: 1px solid #30363d; align-items: center; }
        .nav-btns { display: flex; gap: 10px; }

        /* Основной контент */
        .game-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 15px; }
        .main-zone { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }

        /* Игровая область */
        .canvas-container { flex: 1; background: #000; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #30363d;
            background-image: linear-gradient(rgba(88,166,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(88,166,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px; }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; font-weight: 900; z-index: 5; pointer-events: none; }
        
        /* Кнопки и формы */
        .controls { background: var(--card); padding: 20px; border-radius: 12px; margin-top: 15px; display: flex; gap: 10px; }
        input, button.action { padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; }
        .btn { cursor: pointer; border: none; font-weight: bold; transition: 0.2s; padding: 8px 15px; border-radius: 6px; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-green { background: var(--win); color: white; width: 150px; }
        .btn-gray { background: #30363d; color: #8b949e; }

        /* Модальные окна */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); 
            padding: 25px; border-radius: 12px; border: 1px solid var(--accent); z-index: 100; min-width: 300px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
        .modal h3 { margin-top: 0; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--accent);">ROCKET CRASH</div>
    <div class="nav-btns">
        <button class="btn btn-gray" onclick="toggleModal('profileModal')">Профиль</button>
        <button class="btn btn-gray" onclick="toggleModal('settingsModal')">Настройки</button>
    </div>
</header>

<div class="game-layout">
    <div class="sidebar">
        <h4>История</h4>
        <div id="history" style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px;"></div>
        <h4>Игроки онлайн</h4>
        <div id="playersList" style="font-size: 14px; overflow-y: auto;"></div>
    </div>

    <div class="main-zone">
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div id="multiplier">1.00x</div>
        </div>
        <div class="controls">
            <input type="number" id="betInput" value="100" style="flex: 1;">
            <button id="mainBtn" class="btn btn-blue" style="flex: 2; font-size: 1.1rem;">Сделать ставку</button>
        </div>
    </div>
</div>

<!-- Модалка Профиля -->
<div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>
<div class="modal" id="profileModal">
    <h3>Личный кабинет</h3>
    <p>Никнейм: <input type="text" id="usernameInput" style="width: 80%; margin-top: 5px;"></p>
    <p>Ваш рекорд: <span id="bestRecord" style="color: gold;">1.00x</span></p>
    <button class="btn btn-blue" onclick="saveProfile()">Сохранить</button>
</div>

<!-- Модалка Настроек -->
<div class="modal" id="settingsModal">
    <h3>Настройки</h3>
    <div style="margin-bottom: 10px;">
        <label><input type="checkbox" checked> Звуковые эффекты</label>
    </div>
    <div style="margin-bottom: 15px;">
        <label><input type="checkbox" checked> Плавная анимация</label>
    </div>
    <button class="btn btn-gray" onclick="closeAllModals()">Закрыть</button>
</div>

<script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const mainBtn = document.getElementById('mainBtn');
    const multText = document.getElementById('multiplier');
    const playersList = document.getElementById('playersList');

    let gameState = 'waiting';
    let myBet = null;
    let userData = {
        name: localStorage.getItem('rocketName') || 'Gamer_' + Math.floor(Math.random()*999),
        best: parseFloat(localStorage.getItem('rocketBest')) || 1.0
    };

    // Инициализация профиля
    document.getElementById('usernameInput').value = userData.name;
    document.getElementById('bestRecord').innerText = userData.best.toFixed(2) + 'x';

    function toggleModal(id) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    }

    function closeAllModals() {
        document.querySelectorAll('.modal, .modal-overlay').forEach(el => el.style.display = 'none');
    }

    function saveProfile() {
        userData.name = document.getElementById('usernameInput').value;
        localStorage.setItem('rocketName', userData.name);
        socket.emit('updateName', { name: userData.name }); // Отправляем серверу новое имя
        closeAllModals();
    }

    // Ресайз канваса
    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.onresize = resize; resize();

    function drawRocket(mult) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (gameState !== 'flying') return;
        const progress = Math.min((mult - 1) / 5, 1);
        const x = progress * (canvas.width - 120) + 60;
        const y = canvas.height - (Math.pow(progress, 1.4) * (canvas.height - 120) + 60);
        
        ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 3; ctx.beginPath();
        ctx.moveTo(50, canvas.height - 50); ctx.quadraticCurveTo(canvas.width/2, canvas.height-50, x, y); ctx.stroke();
        
        ctx.font = '50px serif'; ctx.save(); ctx.translate(x, y); ctx.rotate(-Math.PI / 4);
        ctx.fillText('🚀', -25, 25); ctx.restore();
    }

    // Слушаем сервер на предмет реальных игроков
    socket.on('playersUpdate', (list) => {
        playersList.innerHTML = list.map(p => `<div style="padding:5px; border-bottom:1px solid #21262d;">👤 ${p.name}</div>`).join('');
    });

    socket.on('multiplierUpdate', (data) => {
        gameState = 'flying';
        multText.innerText = data.multiplier.toFixed(2) + 'x';
        multText.style.color = 'white';
        drawRocket(data.multiplier);

        if (myBet && !myBet.cashedOut) {
            mainBtn.innerText = `ЗАБРАТЬ ${(document.getElementById('betInput').value * data.multiplier).toFixed(2)}`;
            mainBtn.className = 'btn btn-green';
        } else {
            mainBtn.className = 'btn btn-gray';
            mainBtn.innerText = 'В полете...';
        }
    });

    socket.on('gameCrash', (data) => {
        gameState = 'crashed';
        multText.innerText = 'CRASHED';
        multText.style.color = '#da3633';
        mainBtn.className = 'btn btn-gray';
        mainBtn.innerText = 'Взрыв!';
        
        // История
        const h = document.getElementById('history');
        const item = document.createElement('div');
        item.style = `padding:3px 6px; background:#21262d; border-radius:4px; font-size:12px; color:${data.multiplier > 2 ? '#238636' : '#8b949e'}`;
        item.innerText = data.multiplier.toFixed(2) + 'x';
        h.prepend(item);
        
        setTimeout(() => {
            gameState = 'waiting';
            mainBtn.className = 'btn btn-blue';
            mainBtn.innerText = 'Сделать ставку';
            myBet = null;
        }, 2500);
    });

    mainBtn.onclick = () => {
        if (gameState === 'waiting' && !myBet) {
            const amount = document.getElementById('betInput').value;
            socket.emit('placeBet', { amount, name: userData.name });
            myBet = { amount, cashedOut: false };
            mainBtn.innerText = 'Ожидаем взлета...';
            mainBtn.className = 'btn btn-gray';
        } else if (gameState === 'flying' && myBet && !myBet.cashedOut) {
            const winMult = parseFloat(multText.innerText);
            socket.emit('cashout');
            myBet.cashedOut = true;
            mainBtn.innerText = 'Выигрыш взят!';
            mainBtn.className = 'btn btn-gray';

            // Проверка рекорда
            if (winMult > userData.best) {
                userData.best = winMult;
                localStorage.setItem('rocketBest', winMult);
                document.getElementById('bestRecord').innerText = winMult.toFixed(2) + 'x';
            }
        }
    };
</script>
</body>
</html>
