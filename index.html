<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket Crash Lite</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #c4ff00; --txt: #fff; --dim: #888; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        header { display: flex; justify-content: space-between; padding: 12px 18px; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; background: #1a1a1a; border-radius: 50%; border: 1px solid #333; }
        .wallet { background: var(--card); padding: 6px 14px; border-radius: 20px; font-weight: bold; border: 1px solid #222; color: #0088ff; }

        /* Игровое поле с сеткой */
        .game-window { margin: 10px; flex: 1.5; position: relative; background: #050505; border-radius: 20px; border: 1px solid #1a1a1a; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        .mult-overlay { position: absolute; top: 45%; left: 15%; transform: translateY(-50%); font-size: 3.5rem; font-weight: 900; color: var(--accent); z-index: 10; pointer-events: none; }

        /* История */
        .h-row { display: flex; gap: 8px; padding: 5px 15px; overflow-x: auto; min-height: 35px; }
        .h-tag { padding: 6px 14px; border-radius: 10px; background: var(--card); font-size: 13px; font-weight: 800; color: var(--dim); border: 1px solid #1a1a1a; white-space: nowrap; }

        /* Управление */
        .controls { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bet-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--accent); color: #000; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .bet-btn:disabled { background: #1a1a1a; color: #444; }

        /* Списки игроков */
        .p-list { flex: 1; overflow-y: auto; padding: 0 15px; font-size: 13px; }
        .p-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; color: var(--dim); }

        /* Нижнее меню (Только Crash и Profile) */
        nav { display: flex; justify-content: space-around; background: var(--card); padding: 12px 0 25px; border-top: 1px solid #1a1a1a; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--dim); font-size: 11px; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        /* Модалка Профиля */
        #profile-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; width: 85%; text-align: center; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; width: 90%; margin-bottom: 15px; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

<header id="view-header">
    <div class="user-info">
        <div class="avatar"></div>
        <span id="display-nick" style="font-weight:bold">Player...</span>
    </div>
    <div class="wallet">💎 <span id="balance">1000</span></div>
</header>

<!-- ЭКРАН ИГРЫ -->
<div id="crash-screen" style="display: flex; flex-direction: column; flex: 1;">
    <div class="game-window">
        <canvas id="c"></canvas>
        <div class="mult-overlay" id="mult">x1.00</div>
    </div>
    <div class="h-row" id="h-row"></div>
    <div class="controls">
        <button class="bet-btn" id="btn">ПОДКЛЮЧЕНИЕ...</button>
    </div>
    <div class="p-list" id="p-list"></div>
</div>

<!-- ЭКРАН ПРОФИЛЯ -->
<div id="profile-modal">
    <div class="modal-card">
        <h3>Мой Профиль</h3>
        <input type="text" id="nick-input" placeholder="Введите никнейм">
        <button class="bet-btn" onclick="saveNick()">Сохранить</button>
        <p onclick="closeProfile()" style="margin-top:20px; color:var(--dim); font-size:14px">Назад к игре</p>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showScreen('crash')"><span style="font-size:20px">🚀</span>Crash</div>
    <div class="nav-item" onclick="showScreen('profile')"><span style="font-size:20px">👤</span>Profile</div>
</nav>

<script>
    const socket = io();
    const canv = document.getElementById('c'), ctx = canv.getContext('2d');
    const bBtn = document.getElementById('btn'), mDisp = document.getElementById('mult');
    
    let st = 'WAIT', mult = 1.00, bal = 1000.0;
    let myNick = localStorage.getItem('n') || "Player" + Math.floor(100 + Math.random() * 899);
    let stars = [], trail = [];

    // Инициализация
    localStorage.setItem('n', myNick);
    document.getElementById('display-nick').innerText = myNick;
    document.getElementById('nick-input').value = myNick;

    function showScreen(type) {
        if(type === 'profile') document.getElementById('profile-modal').style.display = 'flex';
        else document.getElementById('profile-modal').style.display = 'none';
    }
    function closeProfile() { showScreen('crash'); }
    function saveNick() {
        const val = document.getElementById('nick-input').value;
        if(val) {
            myNick = val;
            localStorage.setItem('n', val);
            document.getElementById('display-nick').innerText = val;
            socket.emit('join', { name: val });
            closeProfile();
        }
    }

    function res() { 
        canv.width = canv.offsetWidth; canv.height = canv.offsetHeight;
        stars = []; for(let i=0; i<30; i++) stars.push({x:Math.random()*canv.width, y:Math.random()*canv.height, s:Math.random()*1.5});
    }
    window.onresize = res; res();

    function draw(m) {
        ctx.clearRect(0,0,canv.width, canv.height);
        // Сетка
        ctx.strokeStyle = 'rgba(196, 255, 0, 0.03)'; ctx.lineWidth = 0.5;
        for(let i=0; i<canv.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canv.height); ctx.stroke(); }
        for(let i=0; i<canv.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        
        stars.forEach(s => {
            s.y += (st === 'FLY' ? m*0.4 : 0.2); if(s.y > canv.height) s.y = 0;
            ctx.fillStyle = '#333'; ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        if(st === 'FLY') {
            let p = Math.min((m - 1) / 5, 1);
            let x = 60 + p * (canv.width - 120), y = canv.height - 60 - p * (canv.height - 120);
            ctx.strokeStyle = '#c4ff00'; ctx.lineWidth = 3; ctx.beginPath();
            ctx.moveTo(40, canv.height-40); ctx.quadraticCurveTo(canv.width/2, canv.height-40, x, y); ctx.stroke();
            ctx.font = '50px Arial'; ctx.save(); ctx.translate(x, y); ctx.rotate(-Math.PI/4 * p);
            ctx.fillText('🚀', -25, 25); ctx.restore();
        }
    }

    socket.on('connect', () => {
        bBtn.innerText = 'ОЖИДАНИЕ...';
        socket.emit('join', { name: myNick });
    });

    socket.on('gameState', (d) => {
        st = d.state;
        if(st === 'WAIT') {
            mult = 1.0; mDisp.innerText = 'x1.00'; mDisp.style.color = '#c4ff00';
            bBtn.innerText = 'ПОСТАВИТЬ'; bBtn.disabled = false; bBtn.style.background = '#c4ff00';
            document.getElementById('p-list').innerHTML = '';
        }
        if(st === 'CRASH') {
            mDisp.innerText = 'CRASH!'; mDisp.style.color = '#ff3e3e';
            bBtn.disabled = true; bBtn.style.background = '#1a1a1a';
            if(d.history) {
                document.getElementById('h-row').innerHTML = d.history.slice(0,8).map(v => `<div class="h-tag">${v}x</div>`).join('');
            }
        }
    });

    socket.on('tick', (d) => {
        if(d.multiplier && st === 'FLY') {
            mult = parseFloat(d.multiplier);
            mDisp.innerText = 'x' + mult.toFixed(2);
            draw(mult);
            if(bBtn.innerText === 'ГОТОВО') {
                bBtn.disabled = false; bBtn.style.background = '#0088ff'; bBtn.style.color = '#fff';
                bBtn.innerText = 'ЗАБРАТЬ x' + mult.toFixed(2);
            }
        }
        if(st === 'WAIT' && d.timer) bBtn.innerText = 'ВЗЛЕТ ЧЕРЕЗ ' + d.timer + 'с';
    });

    bBtn.onclick = () => {
        if(st === 'WAIT') {
            socket.emit('placeBet', { bet: 100, name: myNick });
            bBtn.innerText = 'ГОТОВО'; bBtn.disabled = true; bBtn.style.background = '#1a1a1a';
        } else if(st === 'FLY') {
            socket.emit('cashOut');
            bBtn.innerText = 'ЗАБРАНО!'; bBtn.disabled = true;
        }
    };

    setInterval(() => { if(st !== 'FLY') draw(1); }, 60);
</script>
</body>
</html>
