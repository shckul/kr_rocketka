<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash TON Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0b0e11; --card: #14171a; --accent: #c8ff00;
            --text: #ffffff; --gray: #5e6673; --red: #ff4d4d;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; background: #2b2f36; border-radius: 50%; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .balance { background: #1e2329; padding: 5px 15px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .game-container { position: relative; background: var(--card); margin: 0 10px; height: 260px; border-radius: 24px; border: 1px solid #2b2f36; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #gameCanvas { width: 100%; height: 100%; position: absolute; }
        #mult-overlay { position: relative; font-size: 3.5rem; font-weight: 800; z-index: 10; pointer-events: none; }
        .history-bar { display: flex; gap: 8px; padding: 15px 10px; overflow-x: auto; scrollbar-width: none; }
        .hist-item { background: #1e2329; padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: bold; color: #bdc2c9; flex-shrink: 0; }
        .action-area { padding: 0 10px 15px; }
        .main-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-waiting { background: var(--accent); color: #000; }
        .btn-placed { background: #2b2f36; color: var(--gray); cursor: default; }
        .btn-cashout { background: #ffffff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .players-section { flex-grow: 1; background: #0f1216; margin: 0 10px; border-radius: 20px 20px 0 0; padding: 15px; overflow-y: auto; }
        .player-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1d21; font-size: 14px; }
        .tab-bar { display: flex; justify-content: space-around; padding: 12px 0 25px; background: var(--card); border-top: 1px solid #2b2f36; }
        .tab-item { color: var(--gray); text-align: center; font-size: 11px; cursor: pointer; }
        .tab-item.active { color: var(--accent); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e2329; width: 85%; padding: 25px; border-radius: 24px; z-index: 101; display: none; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #0b0e11; border: 1px solid #2b2f36; color: #fff; border-radius: 12px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- ВКЛАДКА ИГРЫ -->
    <div id="game-page" style="display: flex; flex-direction: column; height: 100%;">
        <div class="header">
            <div class="user-info">
                <div class="avatar"><img id="user-avatar" src="https://api.dicebear.com"></div>
                <div id="display-name" style="font-weight: bold;">Guest</div>
            </div>
            <div class="balance">💎 <span id="user-balance">0.00</span></div>
        </div>
        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="mult-overlay">x1.00</div>
        </div>
        <div class="history-bar" id="history"></div>
        <div class="action-area">
            <button id="mainBtn" class="main-btn btn-waiting" onclick="handleBtnClick()">Wait for bets</button>
        </div>
        <div class="players-section"><div id="players-list"></div></div>
    </div>

    <!-- ВКЛАДКА ПРОФИЛЯ -->
    <div id="profile-page" style="display:none; padding: 20px;">
        <h2 style="text-align:center;">Настройки профиля</h2>
        <div style="background: var(--card); padding: 20px; border-radius: 20px;">
            <label>Изменить никнейм:</label>
            <input type="text" id="nameInput" placeholder="Введите имя...">
            <button class="main-btn btn-waiting" onclick="updateProfile()">Сохранить</button>
        </div>
    </div>

    <!-- ТАББАР (ВЕРНУЛ) -->
    <div class="tab-bar">
        <div class="tab-item active" id="tab-game" onclick="switchTab('game')">🚀<br>Crash</div>
        <div class="tab-item" id="tab-profile" onclick="switchTab('profile')">👤<br>Profile</div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="betModal">
        <h3 style="text-align:center; margin:0;">Ставка</h3>
        <input type="number" id="betInput" value="10">
        <button class="main-btn btn-waiting" onclick="confirmBet()">Place Bet</button>
    </div>

<script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const multEl = document.getElementById('mult-overlay');
    let currentStatus = 'WAIT', multiplier = 1.00, hasBetThisRound = false, gridOffset = 0;

    function resize() { canvas.width = canvas.clientWidth * window.devicePixelRatio; canvas.height = canvas.clientHeight * window.devicePixelRatio; ctx.scale(window.devicePixelRatio, window.devicePixelRatio); }
    window.onresize = resize; resize();

    function draw() {
        const w = canvas.width / window.devicePixelRatio, h = canvas.height / window.devicePixelRatio;
        ctx.clearRect(0, 0, w, h);
        gridOffset += (currentStatus === 'FLY' ? (multiplier ** 1.2) * 2 : 0.5);
        ctx.strokeStyle = '#1e2329';
        for(let x = (w - gridOffset % 50); x > -50; x -= 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
        if (currentStatus === 'FLY') {
            const rX = Math.min(w * 0.2 + (multiplier - 1) * 30, w * 0.85), rY = Math.max(h * 0.7 - (multiplier - 1) * 40, h * 0.15);
            ctx.fillStyle = '#c8ff00'; ctx.shadowBlur = 15; ctx.shadowColor = '#c8ff00';
            ctx.beginPath(); ctx.arc(rX, rY, 10, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            ctx.strokeStyle = '#c8ff00'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(rX, rY); ctx.lineTo(rX-40, rY+30); ctx.stroke();
        }
        requestAnimationFrame(draw);
    }
    draw();

    socket.on('updateBalance', (data) => { document.getElementById('user-balance').innerText = parseFloat(data.balance).toFixed(2); });
    socket.on('errorMsg', (data) => { alert(data.text); hasBetThisRound = false; updateBtn(); });

    socket.on('gameState', (data) => {
        currentStatus = data.state;
        if(data.state === 'WAIT') { multiplier = 1.00; multEl.style.color = '#fff'; hasBetThisRound = false; document.getElementById('players-list').innerHTML = ''; }
        if(data.state === 'CRASH') multEl.style.color = '#ff4d4d';
        if(data.history) document.getElementById('history').innerHTML = data.history.map(v => `<div class="hist-item">${v}x</div>`).join('');
        updateBtn();
    });

    socket.on('tick', (data) => {
        multiplier = parseFloat(data.multiplier);
        multEl.innerText = currentStatus === 'WAIT' ? `Wait ${data.timer}s` : `x${data.multiplier}`;
        if(currentStatus === 'WAIT') updateBtn();
    });

    socket.on('playerAction', (data) => {
        const row = document.createElement('div'); row.className = 'player-row';
        row.innerHTML = `<span>👤 ${data.name}</span> <span style="color:var(--accent)">${data.type === 'bet' ? '💎 '+data.bet : '✅ x'+data.mult}</span>`;
        document.getElementById('players-list').prepend(row);
    });

    function handleBtnClick() {
        if(currentStatus === 'WAIT' && !hasBetThisRound) openModal();
        if(currentStatus === 'FLY' && hasBetThisRound) { socket.emit('cashOut'); hasBetThisRound = false; updateBtn(); }
    }

    function confirmBet() {
        const val = document.getElementById('betInput').value;
        if(val > 0) { socket.emit('placeBet', { bet: val }); hasBetThisRound = true; closeModal(); updateBtn(); }
    }

    function updateBtn() {
        const btn = document.getElementById('mainBtn');
        if(currentStatus === 'WAIT') { btn.innerText = hasBetThisRound ? "BET PLACED" : "PLACE BET"; btn.className = 'main-btn ' + (hasBetThisRound ? 'btn-placed' : 'btn-waiting'); }
        else { btn.innerText = hasBetThisRound ? "CASH OUT" : "PLAYING..."; btn.className = 'main-btn ' + (hasBetThisRound ? 'btn-cashout' : 'btn-placed'); }
    }

    // ФУНКЦИИ ПРОФИЛЯ (ВЕРНУЛ)
    function switchTab(tab) {
        document.getElementById('game-page').style.display = tab === 'game' ? 'flex' : 'none';
        document.getElementById('profile-page').style.display = tab === 'profile' ? 'block' : 'none';
        document.getElementById('tab-game').classList.toggle('active', tab === 'game');
        document.getElementById('tab-profile').classList.toggle('active', tab === 'profile');
    }

    function updateProfile() {
        const n = document.getElementById('nameInput').value;
        if(n) {
            socket.emit('join', { name: n });
            document.getElementById('display-name').innerText = n;
            document.getElementById('user-avatar').src = `https://api.dicebear.com{n}`;
            alert('Ник изменен!'); switchTab('game');
        }
    }

    function openModal() { document.getElementById('betModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
    function closeModal() { document.getElementById('betModal').style.display='none'; document.getElementById('overlay').style.display='none'; }
</script>
</body>
</html>
