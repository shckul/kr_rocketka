<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Crash Game</title>
    <script src="https://cdn.socket.io"></script>
    <style>
        :root {
            --bg-color: #0b0e11;
            --card-bg: #1e2329;
            --primary: #f0b90b;
            --success: #02c076;
            --danger: #cf304a;
            --text: #eaecef;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        /* Область графика */
        .canvas-wrapper {
            position: relative;
            background: #161a1e;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2b3139;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 250px;
            display: block;
        }

        #multiplier {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(240, 185, 11, 0.4);
            z-index: 10;
        }

        /* Стили кнопок и инпутов */
        input {
            background: #2b3139;
            border: 1px solid #474d57;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        /* Состояния кнопки */
        .btn-bet { background-color: var(--primary); color: #000; }
        .btn-bet:hover { background-color: #fcd435; }
        
        .btn-cashout { background-color: var(--success); color: #fff; }
        .btn-cashout:hover { background-color: #03d684; transform: scale(1.02); }

        .btn-disabled { background-color: #474d57 !important; color: #848e9c !important; cursor: not-allowed; }

        #message {
            margin-top: 15px;
            font-weight: 500;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="canvas-wrapper">
        <canvas id="crashCanvas"></canvas>
        <div id="multiplier">1.00x</div>
    </div>

    <input type="number" id="betAmount" placeholder="Сумма ставки" min="1">
    <button id="actionBtn" class="btn-bet">Сделать ставку</button>
    <p id="message"></p>
</div>

<script>
    const socket = io();
    const canvas = document.getElementById('crashCanvas');
    const ctx = canvas.getContext('2d');
    const actionBtn = document.getElementById('actionBtn');
    const multiplierDisplay = document.getElementById('multiplier');
    const message = document.getElementById('message');
    const betInput = document.getElementById('betAmount');

    let isWaiting = true; 
    let hasBet = false;
    let currentMultiplier = 1.0;

    // Настройка размеров Canvas
    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Функция отрисовки графика
    function drawGraph(mult) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isWaiting) return;

        ctx.strokeStyle = '#f0b90b';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 15;
        ctx.shadowColor = "rgba(240, 185, 11, 0.5)";
        
        ctx.beginPath();
        ctx.moveTo(0, canvas.height);

        // Рассчитываем конечную точку
        let progress = Math.min((mult - 1) / 5, 1); // Масштабируем до x6
        let targetX = progress * canvas.width;
        let targetY = canvas.height - (Math.pow(progress, 2) * (canvas.height - 50));

        // Рисуем кривую Безье
        ctx.quadraticCurveTo(targetX / 2, canvas.height, targetX, targetY);
        ctx.stroke();

        // Рисуем ракету (точку)
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(targetX, targetY, 6, 0, Math.PI * 2);
        ctx.fill();
    }

    socket.on('multiplierUpdate', (data) => {
        isWaiting = false;
        currentMultiplier = data.multiplier;
        multiplierDisplay.innerText = currentMultiplier.toFixed(2) + 'x';
        multiplierDisplay.style.color = "var(--primary)";
        drawGraph(currentMultiplier);

        if (hasBet) {
            actionBtn.innerText = `Забрать ${(betInput.value * currentMultiplier).toFixed(2)}`;
            actionBtn.className = 'btn-cashout';
        }
    });

    socket.on('gameCrash', (data) => {
        isWaiting = true;
        multiplierDisplay.innerText = 'BOOM!';
        multiplierDisplay.style.color = "var(--danger)";
        
        actionBtn.innerText = 'Сделать ставку';
        actionBtn.className = 'btn-bet';
        hasBet = false;
        
        // Очистка графика через секунду
        setTimeout(() => {
            if(isWaiting) ctx.clearRect(0, 0, canvas.width, canvas.height);
        }, 1000);
    });

    actionBtn.onclick = () => {
        if (!hasBet) {
            const amount = parseFloat(betInput.value);
            if (isNaN(amount) || amount <= 0) return alert('Введите ставку');
            
            socket.emit('placeBet', { amount });
            hasBet = true;
            actionBtn.innerText = 'Ожидание...';
            actionBtn.className = 'btn-disabled';
            message.innerText = 'Ставка принята!';
        } else {
            socket.emit('cashout');
            hasBet = false;
            actionBtn.innerText = 'Сделать ставку';
            actionBtn.className = 'btn-bet';
        }
    };

    socket.on('cashoutSuccess', (data) => {
        message.innerText = `Вы выиграли: ${data.winAmount.toFixed(2)}!`;
        hasBet = false;
        actionBtn.className = 'btn-disabled';
        actionBtn.innerText = 'Успех!';
    });
</script>

</body>
</html>
