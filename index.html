<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket X Mini</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --acc: #00ff41; --txt: #eee; }
        /* Используем dvh для мобильных браузеров */
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        header { display: flex; justify-content: space-between; padding: 10px; background: var(--card); font-size: 14px; border-bottom: 1px solid #222; }
        .bal { color: var(--acc); font-weight: bold; }

        /* Сокращаем высоту игрового поля, чтобы влезли кнопки */
        .vp { position: relative; height: 55%; background: #000; overflow: hidden; border-bottom: 1px solid #111; }
        canvas { width: 100%; height: 100%; }
        #mult { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; font-weight: 900; z-index: 10; }
        
        /* История теперь очень маленькая */
        .h-list { display: flex; gap: 4px; padding: 4px 10px; background: #050505; overflow-x: auto; min-height: 18px; }
        .h-item { font-size: 9px; padding: 2px 5px; background: #1a1a1a; border-radius: 3px; color: #888; }

        /* Список игроков */
        .p-box { flex: 1; overflow-y: auto; font-size: 11px; padding: 5px 12px; background: #080808; }
        .p-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #151515; }

        /* ФИКС: Кнопки теперь максимально компактные */
        .ctrls { background: var(--card); padding: 8px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 6px; }
        .in-row { display: flex; gap: 6px; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; font-size: 14px; width: 30%; }
        .go-btn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; font-size: 14px; background: var(--acc); color: #000; text-transform: uppercase; }
        .go-btn:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleM('p')">👤 <span id="n-disp">Pilot</span></div>
    <div onclick="toggleM('s')">⚙️</div>
    <div class="bal"><span id="b-val">1000</span> ₽</div>
</header>

<div id="h-box" class="h-list"></div>

<div class="vp">
    <canvas id="c"></canvas>
    <div id="mult">1.00x</div>
</div>

<div class="p-box" id="p-list"></div>

<div class="ctrls">
    <div class="in-row">
        <input type="number" id="i-bet" value="100">
        <input type="number" id="i-auto" placeholder="Авто X">
        <button id="btn" class="go-btn">СТАВКА</button>
    </div>
</div>

<!-- Модалки (оставлены без изменений) -->
<div style="display:none" id="ov" onclick="toggleM()" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:90"></div>

<script>
    const socket = io();
    const canv = document.getElementById('c'), ctx = canv.getContext('2d');
    const bBtn = document.getElementById('btn'), mVal = document.getElementById('mult');
    
    let st = 'WAIT', mult = 1.00, bal = 1000.0, nick = localStorage.getItem('n') || "User"+Math.floor(Math.random()*99);
    let stars = [], trail = [];

    document.getElementById('b-val').innerText = bal.toFixed(0);
    document.getElementById('n-disp').innerText = nick;
    socket.emit('join', { name: nick });

    function res() { 
        canv.width = canv.offsetWidth; canv.height = canv.offsetHeight;
        stars = []; for(let i=0; i<30; i++) stars.push({x:Math.random()*canv.width, y:Math.random()*canv.height, s:Math.random()*1.5});
    }
    window.onresize = res; res();

    function draw(m) {
        ctx.clearRect(0,0,canv.width, canv.height);
        // Сетка
        ctx.strokeStyle = '#111'; ctx.lineWidth = 0.5;
        for(let i=0; i<canv.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canv.height); ctx.stroke(); }
        for(let i=0; i<canv.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canv.width,i); ctx.stroke(); }
        
        stars.forEach(s => {
            s.y += (st === 'FLY' ? m*0.5 : 0.2); if(s.y > canv.height) s.y = 0;
            ctx.fillStyle = '#333'; ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        if(st === 'FLY') {
            let p = Math.min((m - 1) / 5, 1);
            let x = 30 + p * (canv.width - 60), y = canv.height - 30 - p * (canv.height - 60);
            ctx.fillStyle = '#00ff41'; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
        }
    }

    socket.on('gameState', (d) => {
        st = d.state;
        if(st === 'WAIT') {
            mult = 1.0; mVal.innerText = '1.00x'; mVal.style.color = '#fff';
            bBtn.innerText = 'СТАВКА'; bBtn.disabled = false; bBtn.style.background = '#00ff41';
        }
        if(st === 'CRASH') {
            mVal.innerText = 'BOOM!'; mVal.style.color = '#ff3e3e';
            bBtn.disabled = true; bBtn.style.background = '#333';
            if(d.history) document.getElementById('h-box').innerHTML = d.history.slice(0,10).map(v => `<div class="h-item">${v}x</div>`).join('');
        }
    });

    socket.on('tick', (d) => {
        if(d.multiplier && st === 'FLY') {
            mult = parseFloat(d.multiplier);
            mVal.innerText = mult.toFixed(2) + 'x';
            draw(mult);
            if(bBtn.innerText === 'ОЖИДАНИЕ') {
                bBtn.disabled = false; bBtn.style.background = '#ffaa00'; bBtn.innerText = 'ВЫВОД';
            }
        }
        if(st === 'WAIT' && d.timer) bBtn.innerText = d.timer;
    });

    bBtn.onclick = () => {
        const amt = parseFloat(document.getElementById('i-bet').value);
        if(st === 'WAIT') {
            if(bal < amt) return;
            bal -= amt; document.getElementById('b-val').innerText = bal.toFixed(0);
            socket.emit('placeBet', { bet: amt, name: nick });
            bBtn.innerText = 'ОЖИДАНИЕ'; bBtn.disabled = true;
        } else if(st === 'FLY') {
            bal += (amt * mult); document.getElementById('b-val').innerText = bal.toFixed(0);
            socket.emit('cashOut');
            bBtn.innerText = 'OK'; bBtn.disabled = true;
        }
    };

    setInterval(() => { if(st !== 'FLY') draw(1); }, 60);
</script>
</body>
</html>
