<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Crash - Full Version</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* БАЗОВЫЕ ЦВЕТА И ШРИФТЫ */
        :root { 
            --bg: #0b0e11; 
            --panel: #1e2329; 
            --accent: #02c076; 
            --danger: #f84960; 
            --text: #eaecef; 
            --border: #2b3139;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* ВЕРХНЕЕ МЕНЮ (НАВИГАЦИЯ) */
        nav { 
            background: var(--panel); 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            padding: 18px 0; 
            border-bottom: 1px solid var(--border); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-item { 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 14px; 
            color: #848e9c; 
            transition: 0.3s;
            position: relative;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -18px; left: 0; width: 100%; height: 3px; background: var(--accent);
        }

        /* КОНТЕЙНЕР СТРАНИЦ */
        .page { display: none; width: 100%; max-width: 900px; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ИСТОРИЯ КОЭФФИЦИЕНТОВ */
        .history-bar { 
            display: flex; gap: 10px; padding: 12px; overflow-x: auto; 
            background: #161a1e; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border);
        }
        .hist-item { padding: 4px 12px; background: #2b3139; border-radius: 4px; font-weight: bold; font-size: 13px; }

        /* ИГРОВОЕ ПОЛЕ (КАНВАС) */
        .game-wrapper { 
            position: relative; width: 900px; height: 450px; 
            background: #15181f; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; 
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .center-ui { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; z-index: 10; pointer-events: none; 
        }
        #multiplier { font-size: 85px; font-weight: 900; letter-spacing: -2px; }
        #status-label { font-size: 18px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }

        /* УПРАВЛЕНИЕ СТАВКАМИ */
        .bet-panel { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--panel); padding: 25px; border-radius: 12px; margin-top: 20px; border: 1px solid var(--border);
        }
        .balance-text { font-size: 22px; }
        .balance-text span { color: var(--accent); font-weight: 800; }
        
        .main-action-btn { 
            background: var(--accent); color: #000; border: none; padding: 18px 50px; 
            border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 18px; transition: 0.2s;
        }
        .main-action-btn:disabled { background: #474d57; color: #848e9c; cursor: not-allowed; }
        .main-action-btn.cashout { background: #f0b90b; }

        /* ПРОФИЛЬ */
        .profile-box { 
            background: var(--panel); padding: 40px; border-radius: 15px; 
            border: 1px solid var(--border); text-align: center; margin-top: 30px;
        }
        .profile-box input { 
            background: #0b0e11; border: 1px solid #444; color: white; padding: 15px; 
            border-radius: 6px; width: 300px; font-size: 16px; margin: 20px 0; outline: none;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-body { background: var(--panel); padding: 40px; border-radius: 15px; width: 350px; text-align: center; border: 1px solid #444; }

        /* СПИСОК ИГРОКОВ */
        .players-section { width: 100%; margin-top: 20px; }
        .player-entry { 
            display: flex; justify-content: space-between; padding: 12px 10px; 
            border-bottom: 1px solid var(--border); font-size: 14px; 
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-item active" id="btn-crash" onclick="openTab('crash')">Crash Game</div>
    <div class="nav-item" id="btn-profile" onclick="openTab('profile')">My Profile</div>
</nav>

<!-- ВКЛАДКА ИГРЫ -->
<div id="tab-crash" class="page active">
    <div class="history-bar" id="history-container"></div>
    
    <div class="game-wrapper">
        <canvas id="gridLayer"></canvas>
        <canvas id="rocketLayer"></canvas>
        <div class="center-ui">
            <div id="status-label">ГОТОВНОСТЬ</div>
            <div id="multiplier">5.0s</div>
        </div>
    </div>

    <div class="bet-panel">
        <div class="balance-text">Баланс: <span id="user-balance">1000.00</span> $</div>
        <button id="actionBtn" class="main-action-btn">WAITING FOR BETS</button>
    </div>

    <div class="players-section" id="players-list-ui">
        <!-- Сюда добавляются игроки -->
    </div>
</div>

<!-- ВКЛАДКА ПРОФИЛЯ -->
<div id="tab-profile" class="page">
    <div class="profile-box">
        <h1 style="margin-top:0">Личный кабинет</h1>
        <p style="color: #848e9c">Здесь вы можете изменить свой игровой псевдоним</p>
        <div style="font-size: 20px; margin: 20px 0;">Ник: <b id="display-nick">Guest</b></div>
        <input type="text" id="new-nick-input" placeholder="Введите новый ник..." maxlength="15">
        <br>
        <button class="main-action-btn" onclick="updateNickname()">ОБНОВИТЬ ПРОФИЛЬ</button>
    </div>
</div>

<!-- ОКНО СТАВКИ -->
<div class="modal-overlay" id="bet-modal">
    <div class="modal-body">
        <h2 style="margin-top:0">Ваша ставка</h2>
        <input type="number" id="bet-amount-field" value="10" min="1">
        <button class="main-action-btn" id="confirm-bet-btn" style="width: 100%;">ПОДТВЕРДИТЬ</button>
        <p onclick="toggleModal(false)" style="color:#848e9c; cursor:pointer; margin-top:20px;">Закрыть</p>
    </div>
</div>

<script>
    const socket = io();
    let current_multiplier = 1.00;
    let current_state = 'WAIT';
    let bet_active = false;

    // --- НАВИГАЦИЯ ---
    function openTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'crash') initCanvas();
    }

    function toggleModal(show) {
        document.getElementById('bet-modal').style.display = show ? 'flex' : 'none';
    }

    function updateNickname() {
        const name = document.getElementById('new-nick-input').value;
        if(name) {
            socket.emit('join', { name: name });
            document.getElementById('display-nick').innerText = name;
            alert('Ник успешно сохранен!');
        }
    }

    // --- ЛОГИКА ГРАФИКИ ---
    const rCanvas = document.getElementById('rocketLayer');
    const gCanvas = document.getElementById('gridLayer');
    const rCtx = rCanvas.getContext('2d');
    const gCtx = gCanvas.getContext('2d');

    function initCanvas() {
        rCanvas.width = gCanvas.width = 900;
        rCanvas.height = gCanvas.height = 450;
        // Рисуем сетку
        gCtx.clearRect(0,0,900,450);
        gCtx.strokeStyle = '#1e2329';
        gCtx.lineWidth = 1;
        for(let x=0; x<900; x+=50) { gCtx.beginPath(); gCtx.moveTo(x,0); gCtx.lineTo(x,450); gCtx.stroke(); }
        for(let y=0; y<450; y+=50) { gCtx.beginPath(); gCtx.moveTo(0,y); gCtx.lineTo(900,y); gCtx.stroke(); }
    }

    function renderLoop() {
        rCtx.clearRect(0, 0, 900, 450);
        if (current_state === 'FLY') {
            // Используем делитель 10 для скорости 0.12
            let progress = Math.min((current_multiplier - 1) / 10, 1);
            let x = 80 + (progress * 720);
            let y = 380 - (Math.pow(progress, 0.6) * 330);
            let floatY = Math.sin(Date.now() / 150) * 5;

            // Рисуем плавную линию
            rCtx.beginPath();
            rCtx.strokeStyle = '#02c076';
            rCtx.lineWidth = 5;
            rCtx.lineCap = 'round';
            rCtx.moveTo(80, 380);
            rCtx.quadraticCurveTo(x/2 + 40, 380, x, y + floatY);
            rCtx.stroke();

            // Рисуем ракету
            rCtx.save();
            rCtx.translate(x, y + floatY);
            rCtx.rotate(-0.4);
            rCtx.fillStyle = '#fff';
            rCtx.fillRect(-15, -10, 35, 20); // Корпус
            rCtx.fillStyle = '#f84960';
            rCtx.beginPath(); rCtx.moveTo(-15, 0); rCtx.lineTo(-35, -8); rCtx.lineTo(-35, 8); rCtx.fill(); // Огонь
            rCtx.restore();
        }
        requestAnimationFrame(renderLoop);
    }

    // --- ОБРАБОТКА СОКЕТОВ ---
    socket.on('tick', (data) => {
        const mLabel = document.getElementById('multiplier');
        if (data.timer) {
            mLabel.innerText = data.timer + 's';
        } else {
            current_multiplier = parseFloat(data.multiplier);
            mLabel.innerText = data.multiplier + 'x';
        }
    });

    socket.on('gameState', (data) => {
        current_state = data.state;
        const btn = document.getElementById('actionBtn');
        const stLabel = document.getElementById('status-label');
        const mLabel = document.getElementById('multiplier');

        if (current_state === 'WAIT') {
            stLabel.innerText = 'СЛЕДУЮЩИЙ РАУНД';
            mLabel.style.color = '#fff';
            btn.innerText = 'СДЕЛАТЬ СТАВКУ';
            btn.disabled = false;
            btn.className = 'main-action-btn';
            bet_active = false;
            document.getElementById('players-list-ui').innerHTML = '';
        } 
        else if (current_state === 'FLY') {
            stLabel.innerText = '';
            if (bet_active) {
                btn.innerText = 'ЗАБРАТЬ';
                btn.className = 'main-action-btn cashout';
                btn.disabled = false;
            } else {
                btn.innerText = 'ИГРА ИДЕТ...';
                btn.disabled = true;
            }
        } 
        else if (current_state === 'CRASH') {
            stLabel.innerText = 'ВЗРЫВ!';
            mLabel.style.color = 'var(--danger)';
            btn.innerText = 'КРАШ';
            btn.disabled = true;
            updateHistoryUI(data.history);
        }
    });

    socket.on('playerAction', (data) => {
        const list = document.getElementById('players-list-ui');
        if(data.type === 'bet') {
            const row = document.createElement('div');
            row.className = 'player-entry';
            row.id = 'player-' + data.name;
            row.innerHTML = `<span>👤 ${data.name}</span><span>$${data.bet}</span>`;
            list.prepend(row);
        }
        if(data.type === 'cashout') {
            const target = document.getElementById('player-' + data.name);
            if(target) {
                target.style.color = 'var(--accent)';
                target.innerHTML = `<span>👤 ${data.name} (ВЫШЕЛ)</span><b>x${data.mult}</b>`;
            }
        }
    });

    socket.on('updateBalance', (data) => {
        document.getElementById('user-balance').innerText = data.balance.toFixed(2);
    });

    // --- КНОПКИ И МОДАЛКИ ---
    const actionBtn = document.getElementById('actionBtn');
    actionBtn.onclick = () => {
        if(current_state === 'WAIT' && !bet_active) toggleModal(true);
        else if(current_state === 'FLY' && bet_active) {
            socket.emit('cashOut');
            bet_active = false;
            actionBtn.innerText = 'СТАВКА ПРИНЯТА';
            actionBtn.disabled = true;
        }
    };

    document.getElementById('confirm-bet-btn').onclick = () => {
        const val = document.getElementById('bet-amount-field').value;
        socket.emit('placeBet', { bet: val });
        bet_active = true;
        actionBtn.innerText = 'СТАВКА ПРИНЯТА';
        actionBtn.disabled = true;
        toggleModal(false);
    };

    function updateHistoryUI(list) {
        const container = document.getElementById('history-container');
        container.innerHTML = '';
        list.forEach(val => {
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.style.color = val > 2 ? 'var(--accent)' : 'var(--danger)';
            item.innerText = val + 'x';
            container.appendChild(item);
        });
    }

    initCanvas();
    renderLoop();
</script>
</body>
</html>
