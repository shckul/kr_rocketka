<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket Elite Player</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --accent: #f0b90b; --win: #02c076; --loss: #cf304a; --text: #eaecef; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Шапка с Профилем */
        header { display: flex; justify-content: space-between; padding: 10px 15px; background: var(--card); border-bottom: 1px solid #2b3139; align-items: center; }
        .user-info { display: flex; flex-direction: column; gap: 2px; }
        #nick-display { font-weight: bold; color: var(--accent); font-size: 0.9rem; cursor: pointer; }
        .record { font-size: 0.75rem; color: #848e9c; }
        .balance { font-weight: bold; font-size: 1.1rem; color: var(--win); }

        /* Игровая зона с сеткой */
        .game-area { position: relative; flex: 1; background: #000; overflow: hidden; }
        .grid { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; 
                background-image: linear-gradient(rgba(240, 185, 11, 0.05) 1px, transparent 1px), 
                                  linear-gradient(90deg, rgba(240, 185, 11, 0.05) 1px, transparent 1px);
                background-size: 50px 50px; transform: rotate(-5deg); pointer-events: none; }
        
        canvas { position: absolute; width: 100%; height: 100%; }
        #mult-display { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); 
                        font-size: 4.5rem; font-weight: 900; z-index: 5; text-shadow: 0 0 30px rgba(0,0,0,0.9); }
        #timer-box { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); 
                     background: rgba(240, 185, 11, 0.15); padding: 8px 20px; border-radius: 30px; 
                     border: 1px solid var(--accent); font-weight: bold; display: none; z-index: 6; }

        /* История коэффициентов */
        .history-bar { display: flex; gap: 8px; overflow-x: auto; padding: 8px 15px; background: #161a1e; border-bottom: 1px solid #2b3139; }
        .h-item { padding: 4px 12px; background: #2b3139; border-radius: 15px; font-size: 0.8rem; font-weight: bold; }

        /* Управление ставками */
        .controls { background: var(--card); padding: 15px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #2b3139; }
        .bet-input-wrap { position: relative; display: flex; width: 100%; }
        input { background: #2b3139; border: 1px solid #474d57; color: #fff; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.1rem; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-main:disabled { background: #474d57; color: #848e9c; }
        
        /* Модалка профиля */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); 
                 padding: 25px; border-radius: 15px; border: 1px solid var(--accent); z-index: 100; width: 80%; max-width: 300px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; }
    </style>
</head>
<body>

<header>
    <div class="user-info" onclick="openProfile()">
        <span id="nick-display">Нажми, чтобы ник</span>
        <span class="record">Рекорд: <b id="best-val">1.00</b>x</span>
    </div>
    <div class="balance"><span id="bal-val">1000.00</span> ₽</div>
</header>

<div id="history-list" class="history-bar"></div>

<div class="game-area">
    <div class="grid"></div>
    <div id="timer-box">Ждем взлета: <span id="timer-sec">5.0</span>с</div>
    <canvas id="game-canvas"></canvas>
    <div id="mult-display">1.00x</div>
</div>

<div class="controls">
    <div class="bet-input-wrap">
        <input type="number" id="bet-amount" value="100">
    </div>
    <button id="action-btn" class="btn-main">Сделать ставку</button>
</div>

<!-- Профиль -->
<div class="overlay" id="overlay" onclick="closeProfile()"></div>
<div class="modal" id="profile-modal">
    <h3 style="margin-top:0">Ваш Профиль</h3>
    <p style="font-size:0.9rem">Изменить никнейм:</p>
    <input type="text" id="new-nick" placeholder="Введите имя..." style="margin-bottom:15px">
    <button class="btn-main" style="width:100%; padding:10px" onclick="saveNick()">Сохранить</button>
</div>

<script>
    const socket = io();
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const multDisp = document.getElementById('mult-display');
    const timerBox = document.getElementById('timer-box');
    const actionBtn = document.getElementById('action-btn');
    const balVal = document.getElementById('bal-val');
    const nickDisp = document.getElementById('nick-display');
    const bestDisp = document.getElementById('best-val');

    let state = 'WAIT';
    let balance = parseFloat(localStorage.getItem('rocket_bal')) || 1000.00;
    let myNick = localStorage.getItem('rocket_nick') || "Пилот_" + Math.floor(Math.random()*999);
    let myBest = parseFloat(localStorage.getItem('rocket_best')) || 1.00;
    let currentMultiplier = 1.00;

    // Инициализация данных
    balVal.innerText = balance.toFixed(2);
    nickDisp.innerText = myNick;
    bestDisp.innerText = myBest.toFixed(2);
    socket.emit('join', { name: myNick });

    function openProfile() { 
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('profile-modal').style.display = 'block';
        document.getElementById('new-nick').value = myNick;
    }
    function closeProfile() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('profile-modal').style.display = 'none';
    }
    function saveNick() {
        const val = document.getElementById('new-nick').value;
        if(val) {
            myNick = val;
            localStorage.setItem('rocket_nick', val);
            nickDisp.innerText = val;
            socket.emit('join', { name: val });
            closeProfile();
        }
    }

    // Отрисовка
    function draw(m) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (state !== 'FLY') return;
        let p = Math.min((m - 1) / 5, 1);
        let x = 60 + p * (canvas.width - 120);
        let y = canvas.height - 60 - p * (canvas.height - 120);
        
        ctx.strokeStyle = '#f0b90b'; ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(60, canvas.height - 60);
        ctx.quadraticCurveTo(canvas.width/2, canvas.height-60, x, y);
        ctx.stroke();

        ctx.font = '45px Arial';
        ctx.save(); ctx.translate(x, y); ctx.rotate(-Math.PI/4 * p);
        ctx.fillText('🚀', -22, 22); ctx.restore();
    }

    socket.on('gameState', (data) => {
        state = data.state;
        if(state === 'WAIT') {
            timerBox.style.display = 'block';
            multDisp.innerText = "1.00x";
            multDisp.style.color = "#fff";
            actionBtn.disabled = false;
            actionBtn.innerText = "Сделать ставку";
            actionBtn.style.background = "var(--accent)";
        }
        if(state === 'FLY') timerBox.style.display = 'none';
        if(state === 'CRASH') {
            multDisp.innerText = "CRASH " + data.multiplier + "x";
            multDisp.style.color = "var(--loss)";
            updateHistory(data.history);
        }
    });

    socket.on('tick', (data) => {
        if(data.timer) document.getElementById('timer-sec').innerText = data.timer;
        if(data.multiplier) {
            currentMultiplier = parseFloat(data.multiplier);
            if(state === 'FLY') {
                multDisp.innerText = currentMultiplier.toFixed(2) + "x";
                draw(currentMultiplier);
                if(actionBtn.innerText === "СТАВКА ПРИНЯТА") {
                    actionBtn.disabled = false;
                    actionBtn.innerText = "ЗАБРАТЬ " + (parseFloat(document.getElementById('bet-amount').value) * currentMultiplier).toFixed(2);
                    actionBtn.style.background = "var(--win)";
                    actionBtn.style.color = "#fff";
                }
            }
        }
    });

    function updateHistory(list) {
        const hl = document.getElementById('history-list');
        hl.innerHTML = list.slice(0, 12).map(v => `<div class="h-item" style="color:${v > 2 ? 'var(--win)' : '#848e9c'}">${v}x</div>`).join('');
    }

    actionBtn.onclick = () => {
        const bet = parseFloat(document.getElementById('bet-amount').value);
        if(state === 'WAIT' && balance >= bet) {
            balance -= bet;
            localStorage.setItem('rocket_bal', balance);
            balVal.innerText = balance.toFixed(2);
            socket.emit('placeBet', { bet: bet, name: myNick });
            actionBtn.disabled = true;
            actionBtn.innerText = "СТАВКА ПРИНЯТА";
        } else if(state === 'FLY' && actionBtn.innerText.includes("ЗАБРАТЬ")) {
            let win = bet * currentMultiplier;
            balance += win;
            localStorage.setItem('rocket_bal', balance);
            balVal.innerText = balance.toFixed(2);
            
            if(currentMultiplier > myBest) {
                myBest = currentMultiplier;
                localStorage.setItem('rocket_best', myBest);
                bestDisp.innerText = myBest.toFixed(2);
            }
            
            socket.emit('cashOut');
            actionBtn.disabled = true;
            actionBtn.innerText = "ВЫИГРЫШ!";
        }
    };

    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.onresize = resize; resize();
</script>
</body>
</html>
