<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Game TMA</title>
    <!-- Подключаем Socket.io и Telegram SDK -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://telegram.org"></script>
    <style>
        body { margin: 0; background: #0b0e11; color: white; font-family: 'Roboto', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #history { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #181a20; border-bottom: 1px solid #2b2f36; }
        .h-item { background: #2b2f36; padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; color: #00ff88; }
        #game-container { flex: 1; position: relative; overflow: hidden; background: radial-gradient(circle at bottom left, #1a1d23, #0b0e11); }
        canvas { width: 100%; height: 100%; display: block; }
        #ui-overlay { position: absolute; top: 30%; left: 0; width: 100%; text-align: center; pointer-events: none; }
        #multiplier { font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.2); }
        #controls { background: #181a20; padding: 20px; border-radius: 24px 24px 0 0; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .info { display: flex; justify-content: space-between; font-size: 0.9rem; color: #848e9c; margin-bottom: 4px; }
        .input-group { position: relative; }
        input { background: #2b2f36; border: 1px solid #3e444e; color: white; padding: 16px; border-radius: 12px; font-size: 1.1rem; width: 100%; box-sizing: border-box; outline: none; }
        #betBtn { background: #00ff88; color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        #betBtn:disabled { background: #3e444e; color: #848e9c; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="history"></div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
        <div id="multiplier">1.00x</div>
    </div>
</div>

<div id="controls">
    <div class="info">
        <span>Баланс: <b id="user-balance" style="color: #fff">1000.00</b></span>
        <span id="status-text">Ожидание...</span>
    </div>
    <div class="input-group">
        <input type="number" id="bet-input" value="10">
    </div>
    <button id="betBtn">СДЕЛАТЬ СТАВКУ</button>
</div>

<script>
    // --- ИНИЦИАЛИЗАЦИЯ ---
    const socket = io(); // Авто-подключение к Render
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const multDisplay = document.getElementById('multiplier');
    const balDisplay = document.getElementById('user-balance');
    const betBtn = document.getElementById('betBtn');

    let gameState = 'WAIT';
    let multiplier = 1.00;
    let stars = [];
    let isBetPlaced = false;

    // Авто-логин через Телеграм
    const user = tg.initDataUnsafe?.user;
    socket.emit('join', { name: user ? user.first_name : "Игрок" });

    // Создаем звезды для фона
    for(let i=0; i<50; i++) {
        stars.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, s: Math.random()*2 });
    }

    // --- ГРАФИКА (ТВОЯ ОРИГИНАЛЬНАЯ ЛОГИКА) ---
    function drawRocket(x, y, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        // Отрисовка пламени
        ctx.fillStyle = '#ff9100';
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-35, -5); ctx.lineTo(-35, 5); ctx.fill();
        // Корпус
        ctx.fillStyle = '#efff';
        ctx.beginPath(); ctx.ellipse(0, 0, 18, 7, 0, 0, Math.PI*2); ctx.fill();
        // Окно
        ctx.fillStyle = '#4affff';
        ctx.beginPath(); ctx.arc(5, 0, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Звезды
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            if(gameState === 'FLY') s.x -= multiplier * 2;
            if(s.x < 0) s.x = canvas.width;
        });

        if(gameState === 'FLY') {
            const x = 80 + (Math.min(multiplier, 10) * 10);
            const y = canvas.height - 100 - (Math.min(multiplier, 10) * 15);
            drawRocket(x, y, -0.4);
        }
        requestAnimationFrame(loop);
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }

    // --- СОБЫТИЯ СЕРВЕРА ---
    socket.on('tick', (data) => {
        multiplier = parseFloat(data.multiplier);
        multDisplay.innerText = data.multiplier + 'x';
    });

    socket.on('gameState', (data) => {
        gameState = data.state;
        if(gameState === 'WAIT') {
            multDisplay.style.color = "#fff";
            betBtn.disabled = false;
            betBtn.innerText = "СДЕЛАТЬ СТАВКУ";
            betBtn.style.background = "#00ff88";
            isBetPlaced = false;
        } else if(gameState === 'FLY') {
            if(isBetPlaced) {
                betBtn.innerText = "ЗАБРАТЬ";
                betBtn.style.background = "#ffcc00";
                betBtn.disabled = false;
            } else {
                betBtn.innerText = "ИДЕТ ПОЛЕТ";
                betBtn.disabled = true;
            }
        } else if(gameState === 'CRASH') {
            multDisplay.style.color = "#ff4444";
            betBtn.innerText = "CRASHED";
            betBtn.disabled = true;
            if(data.history) updateHistory(data.history);
        }
    });

    socket.on('updateBalance', (data) => {
        balDisplay.innerText = data.balance.toFixed(2);
    });

    function updateHistory(list) {
        const histDiv = document.getElementById('history');
        histDiv.innerHTML = '';
        list.forEach(m => {
            const item = document.createElement('div');
            item.className = 'h-item';
            item.innerText = m + 'x';
            histDiv.appendChild(item);
        });
    }

    // --- УПРАВЛЕНИЕ ---
    betBtn.onclick = () => {
        if(gameState === 'WAIT' && !isBetPlaced) {
            const amt = document.getElementById('bet-input').value;
            socket.emit('placeBet', { bet: amt });
            isBetPlaced = true;
            betBtn.innerText = "СТАВКА ПРИНЯТА";
            betBtn.disabled = true;
        } else if(gameState === 'FLY' && isBetPlaced) {
            socket.emit('cashOut');
            isBetPlaced = false;
            betBtn.disabled = true;
        }
    };

    window.addEventListener('resize', resize);
    window.onload = () => { resize(); loop(); };
</script>

</body>
</html>
