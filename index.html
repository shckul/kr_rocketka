<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Crash</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --neon: #dfff00; --bg: #000; --card: #0a0a0a; --grid: rgba(223, 255, 0, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 10px; overflow: hidden; }

        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; }
        .balance { background: #111; padding: 8px 16px; border-radius: 20px; display: flex; align-items: center; gap: 8px; border: 1px solid #222; font-weight: bold; }

        /* Игровое поле с АНИМИРОВАННОЙ СЕТКОЙ */
        .game-view { 
            height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; border-radius: 24px; background: var(--card); border: 1px solid #1a1a1a; 
            margin-top: 10px; overflow: hidden;
        }

        .grid-bg {
            position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 45px 45px;
            top: -50%; left: -50%;
            transform: perspective(500px) rotateX(20deg);
            z-index: 1;
        }

        /* Анимация полета сетки */
        .flying .grid-bg {
            animation: moveGrid 2s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(20deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(20deg) translateY(45px); }
        }

        #multiplier { font-size: 64px; font-weight: 900; color: var(--neon); z-index: 10; display: none; text-shadow: 0 0 30px rgba(223, 255, 0, 0.3); }
        #logo { width: 90px; z-index: 10; filter: drop-shadow(0 0 15px var(--neon)); transition: 0.4s ease-in-out; }

        /* Ожидание и Прогресс */
        .wait-ui { text-align: center; z-index: 10; margin-top: 15px; }
        .progress-bar { width: 180px; height: 5px; background: #222; border-radius: 10px; margin: 15px auto; overflow: hidden; }
        #progress-fill { width: 100%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* История */
        .history { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; scrollbar-width: none; }
        .h-item { padding: 8px 16px; background: #111; border-radius: 12px; font-size: 14px; font-weight: 800; color: #555; border: 1px solid #1a1a1a; transition: 0.3s; }
        .h-item.waiting { background: var(--neon); color: black; border-color: var(--neon); }

        /* Кнопка */
        .btn-bet { background: var(--neon); color: black; width: 100%; padding: 20px; border: none; border-radius: 18px; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(223, 255, 0, 0.2); }
        .btn-bet:active { transform: scale(0.97); }
        .btn-bet:disabled { background: #1a1a1a; color: #444; box-shadow: none; }

        /* Список игроков */
        .player-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #111; }
        .p-info { display: flex; align-items: center; gap: 10px; font-size: 15px; }
        .p-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #222; background: url('https://i.imgur.com') center/cover; }
    </style>
</head>
<body>

    <div class="header">
        <div class="p-info"><div class="p-avatar"></div> <span id="userName">ramazqq</span></div>
        <div class="balance">💎 <span id="balanceDisplay">0.00</span> <span style="color:var(--neon)">+</span></div>
    </div>

    <div class="game-view" id="gameView">
        <div class="grid-bg"></div>
        <img id="logo" src="https://i.imgur.com" alt="logo">
        <div id="multiplier">1.00x</div>
        
        <div id="waitUI" class="wait-ui">
            <div style="font-size: 20px; font-weight: 800;">Waiting<br><small style="opacity:0.5; font-weight:400">for next round</small></div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
    </div>

    <div class="history" id="history">
        <div class="h-item waiting">Waiting</div>
    </div>

    <button id="betBtn" class="btn-bet" onclick="handleAction()">Place bet</button>

    <div id="playersList" style="margin-top: 10px;"></div>

    <script>
        const socket = io();
        let currentBet = 0;
        let isBetting = false;

        socket.on('gameState', data => {
            const view = document.getElementById('gameView');
            const waitUI = document.getElementById('waitUI');
            const multText = document.getElementById('multiplier');
            const logo = document.getElementById('logo');
            const btn = document.getElementById('betBtn');

            if (data.state === 'WAIT') {
                view.classList.remove('flying');
                waitUI.style.display = 'block';
                multText.style.display = 'none';
                logo.style.transform = 'scale(1)';
                multText.style.color = 'var(--neon)';
                btn.innerText = "Place bet";
                btn.disabled = false;
                document.getElementById('playersList').innerHTML = '';
            } 
            
            if (data.state === 'FLY') {
                view.classList.add('flying');
                waitUI.style.display = 'none';
                multText.style.display = 'block';
                logo.style.transform = 'scale(0.6) translateY(-50px)';
                if (currentBet > 0) {
                    btn.innerText = "CASH OUT";
                    btn.disabled = false;
                } else {
                    btn.innerText = "Wait for next";
                    btn.disabled = true;
                }
            }

            if (data.state === 'CRASH') {
                view.classList.remove('flying');
                multText.style.color = '#ff4b2b';
                btn.innerText = "Crashed";
                btn.disabled = true;
                currentBet = 0;
            }

            if (data.history) {
                document.getElementById('history').innerHTML = '<div class="h-item waiting">Waiting</div>' + 
                    data.history.map(v => `<div class="h-item">${v.toFixed(2)}x</div>`).join('');
            }
        });

        socket.on('tick', data => {
            if (data.timer) {
                const p = (data.timer / 5) * 100;
                document.getElementById('progress-fill').style.width = p + '%';
            } else {
                document.getElementById('multiplier').innerText = data.multiplier + 'x';
            }
        });

        socket.on('updateBalance', d => {
            document.getElementById('balanceDisplay').innerText = d.balance.toFixed(2);
        });

        function handleAction() {
            const btn = document.getElementById('betBtn');
            if (btn.innerText === "CASH OUT") {
                socket.emit('cashOut');
                btn.disabled = true;
                return;
            }
            let amt = prompt("Bet amount:", "10");
            if (amt && !isNaN(amt)) {
                socket.emit('placeBet', { bet: parseFloat(amt) });
                currentBet = parseFloat(amt);
                btn.innerText = "BET PLACED";
                btn.disabled = true;
            }
        }

        socket.on('playerAction', data => {
            const list = document.getElementById('playersList');
            const row = `<div class="player-card">
                <div class="p-info"><div class="p-avatar"></div> ${data.name}</div>
                <div style="color:var(--neon); font-weight:bold;">⭐ ${data.type === 'bet' ? data.bet : 'OUT ' + data.mult + 'x'}</div>
            </div>`;
            list.insertAdjacentHTML('afterbegin', row);
        });
    </script>
</body>
</html>
