<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash TON Rocket</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #14171a;
            --accent: #c8ff00;
            --text: #ffffff;
            --gray: #5e6673;
            --red: #ff4d4d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; background: #2b2f36; border-radius: 50%; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .balance { background: #1e2329; padding: 6px 16px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 6px; border: 1px solid #2b2f36; }

        /* Game Area */
        .game-view {
            position: relative;
            background: var(--card);
            margin: 0 12px;
            height: 280px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #2b2f36;
            background-image: radial-gradient(circle at 50% 50%, #1a1d21 0%, #14171a 100%);
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #mult-overlay {
            position: absolute;
            top: 40%; left: 20%;
            font-size: 3.8rem;
            font-weight: 900;
            pointer-events: none;
            z-index: 10;
            transition: color 0.3s;
        }

        /* History */
        .history-bar { display: flex; gap: 8px; padding: 15px 12px; overflow-x: auto; scrollbar-width: none; }
        .history-bar::-webkit-scrollbar { display: none; }
        .hist-item { background: #1e2329; padding: 6px 14px; border-radius: 14px; font-size: 13px; font-weight: 800; color: #bdc2c9; min-width: fit-content; }

        /* Controls */
        .action-area { padding: 0 12px 15px; }
        .main-btn { 
            width: 100%; padding: 20px; border-radius: 18px; border: none; 
            font-size: 18px; font-weight: 800; text-transform: uppercase; 
            cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-waiting { background: var(--accent); color: #000; }
        .btn-placed { background: #2b2f36; color: var(--gray); cursor: default; }
        .btn-cashout { background: #ffffff; color: #000; box-shadow: 0 0 25px rgba(255,255,255,0.4); }

        /* Players List */
        .players-section { 
            flex-grow: 1; background: #0f1216; margin: 0 12px; 
            border-radius: 24px 24px 0 0; padding: 18px; overflow-y: auto; 
        }
        .player-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1d21; font-size: 14px; align-items: center; }
        .p-info { display: flex; align-items: center; gap: 8px; }
        .p-bet { color: var(--accent); font-weight: bold; }

        /* Tabs */
        .tab-bar { display: flex; justify-content: space-around; padding: 12px 0 30px; background: var(--card); border-top: 1px solid #2b2f36; }
        .tab-item { color: var(--gray); text-align: center; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .tab-item.active { color: var(--accent); }
        .tab-icon { font-size: 20px; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(4px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e2329; width: 85%; padding: 30px; border-radius: 28px; z-index: 101; display: none; text-align: center; border: 1px solid #2b2f36; }
        input { width: 100%; padding: 18px; margin: 20px 0; background: #0b0e11; border: 1px solid #2b2f36; color: #fff; border-radius: 14px; box-sizing: border-box; font-size: 20px; text-align: center; outline: none; }
        input:focus { border-color: var(--accent); }

        #profile-page { display: none; padding: 25px; }
        .profile-card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #2b2f36; }
    </style>
</head>
<body>

    <!-- Вкладка Игры -->
    <div id="game-page" style="display: flex; flex-direction: column; height: 100%;">
        <div class="header">
            <div class="user-info">
                <div class="avatar"><img src="https://api.dicebear.com" id="user-avatar"></div>
                <div id="display-name" style="font-weight: 800; font-size: 18px;">ramazqq</div>
            </div>
            <div class="balance">
                <span style="color: #0088cc;">💎</span>
                <span id="user-balance">100.00</span>
            </div>
        </div>

        <div class="game-view">
            <div id="mult-overlay">x1.00</div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="history-bar" id="history"></div>

        <div class="action-area">
            <button id="mainBtn" class="main-btn btn-waiting" onclick="handleBtnClick()">Waiting for bets</button>
        </div>

        <div class="players-section">
            <div style="font-size: 12px; color: var(--gray); margin-bottom: 12px; font-weight: 600; letter-spacing: 1px;">LIVE BETS</div>
            <div id="players-list"></div>
        </div>
    </div>

    <!-- Вкладка Профиля -->
    <div id="profile-page">
        <h2 style="margin-bottom: 25px;">Settings</h2>
        <div class="profile-card">
            <label style="color: var(--gray); font-size: 14px;">Nickname</label>
            <input type="text" id="nameInput" placeholder="Enter new name...">
            <button class="main-btn btn-waiting" onclick="updateProfile()">Save Changes</button>
        </div>
    </div>

    <!-- Модалка ставки -->
    <div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="betModal">
        <h3 style="margin: 0; font-size: 22px;">Place your bet</h3>
        <input type="number" id="betInput" placeholder="0.00" step="0.01">
        <button class="main-btn btn-waiting" onclick="confirmBet()">Confirm Bet</button>
        <div style="margin-top: 20px; color: var(--gray); font-weight: 600;" onclick="closeModal()">Cancel</div>
    </div>

    <!-- Навигация -->
    <div class="tab-bar">
        <div class="tab-item active" id="tab-game" onclick="switchTab('game')">
            <span class="tab-icon">🚀</span><span>Crash</span>
        </div>
        <div class="tab-item" id="tab-profile" onclick="switchTab('profile')">
            <span class="tab-icon">👤</span><span>Profile</span>
        </div>
    </div>

<script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const multEl = document.getElementById('mult-overlay');
    
    let currentStatus = 'WAIT';
    let multiplier = 1.00;
    let hasBetThisRound = false;
    let gridOffset = 0;
    let particles = [];

    // Ресайз холста
    function resize() {
        canvas.width = canvas.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.clientHeight * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.onresize = resize;
    resize();

    // --- Анимация ---
    function draw() {
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        ctx.clearRect(0, 0, w, h);
        
        // Смещение сетки (ускоряется с ростом кэфа)
        const speed = currentStatus === 'FLY' ? (multiplier ** 1.5) * 2 : 0.5;
        gridOffset += speed;
        
        // Отрисовка сетки
        ctx.strokeStyle = '#1e2329';
        ctx.lineWidth = 1;
        const gridSize = 50;
        
        for(let x = (w - gridOffset % gridSize); x > -gridSize; x -= gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        }
        for(let y = (gridOffset % gridSize); y < h + gridSize; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        }

        if (currentStatus === 'FLY') {
            // Координаты ракеты (летит в правый верхний угол)
            const rocketX = w * 0.2 + (multiplier - 1) * 30;
            const rocketY = h * 0.7 - (multiplier - 1) * 40;
            const clampedX = Math.min(rocketX, w * 0.85);
            const clampedY = Math.max(rocketY, h * 0.15);

            // След ракеты (свечение)
            const grad = ctx.createRadialGradient(clampedX, clampedY, 0, clampedX, clampedY, 60);
            grad.addColorStop(0, 'rgba(200, 255, 0, 0.3)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,w,h);

            // Сама "Ракета" (желтое ядро)
            ctx.fillStyle = '#c8ff00';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#c8ff00';
            ctx.beginPath();
            ctx.arc(clampedX, clampedY, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Хвост (линия)
            ctx.strokeStyle = '#c8ff00';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(clampedX, clampedY);
            ctx.lineTo(clampedX - 40, clampedY + 30);
            ctx.stroke();
        }

        requestAnimationFrame(draw);
    }
    draw();

    // --- Socket Логика ---
    socket.on('gameState', (data) => {
        currentStatus = data.state;
        if(data.state === 'WAIT') {
            multiplier = 1.00;
            multEl.style.color = '#ffffff';
            hasBetThisRound = false;
            document.getElementById('players-list').innerHTML = '';
        }
        if(data.state === 'CRASH') {
            multEl.style.color = '#ff4d4d';
        }
        if(data.history) updateHistory(data.history);
        updateBtn();
    });

    socket.on('tick', (data) => {
        multiplier = parseFloat(data.multiplier);
        if(currentStatus === 'WAIT') {
            multEl.innerText = `x1.00`;
            document.getElementById('mainBtn').innerText = hasBetThisRound ? "BET PLACED" : `Wait ${data.timer}s`;
        } else {
            multEl.innerText = `x${data.multiplier}`;
        }
    });

    socket.on('playerAction', (data) => {
        const list = document.getElementById('players-list');
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `<div class="p-info"><div class="avatar" style="width:24px;height:24px"><img src="https://api.dicebear.com{data.name}"></div> <span>${data.name}</span></div>
                         <div class="p-bet">💎 ${data.bet}</div>`;
        list.prepend(row);
    });

    // --- Функции кликов ---
    function handleBtnClick() {
        if(currentStatus === 'WAIT' && !hasBetThisRound) openModal();
        if(currentStatus === 'FLY' && hasBetThisRound) {
            socket.emit('cashOut');
            hasBetThisRound = false;
            updateBtn();
            // Логика выигрыша (примерная)
            let b = parseFloat(document.getElementById('user-balance').innerText);
            let win = myLastBet * multiplier;
            document.getElementById('user-balance').innerText = (b + win).toFixed(2);
        }
    }

    let myLastBet = 0;
    function confirmBet() {
        const val = document.getElementById('betInput').value;
        if(val > 0) {
            myLastBet = parseFloat(val);
            socket.emit('placeBet', { bet: val });
            hasBetThisRound = true;
            closeModal();
            updateBtn();
            let b = parseFloat(document.getElementById('user-balance').innerText);
            document.getElementById('user-balance').innerText = (b - val).toFixed(2);
        }
    }

    function updateBtn() {
        const btn = document.getElementById('mainBtn');
        if(currentStatus === 'WAIT') {
            btn.className = 'main-btn ' + (hasBetThisRound ? 'btn-placed' : 'btn-waiting');
            if(!hasBetThisRound) btn.innerText = "Place Bet";
        } else if(currentStatus === 'FLY') {
            btn.innerText = hasBetThisRound ? "CASH OUT" : "Playing...";
            btn.className = 'main-btn ' + (hasBetThisRound ? 'btn-cashout' : 'btn-placed');
        } else {
            btn.innerText = "Crashed";
            btn.className = 'main-btn btn-placed';
        }
    }

    function updateHistory(history) {
        document.getElementById('history').innerHTML = history.map(v => `<div class="hist-item">${v}x</div>`).join('');
    }

    // --- Интерфейс ---
    function switchTab(tab) {
        document.getElementById('game-page').style.display = tab === 'game' ? 'flex' : 'none';
        document.getElementById('profile-page').style.display = tab === 'profile' ? 'block' : 'none';
        document.getElementById('tab-game').classList.toggle('active', tab === 'game');
        document.getElementById('tab-profile').classList.toggle('active', tab === 'profile');
    }

    function updateProfile() {
        const n = document.getElementById('nameInput').value;
        if(n) {
            socket.emit('join', { name: n });
            document.getElementById('display-name').innerText = n;
            document.getElementById('user-avatar').src = `https://api.dicebear.com{n}`;
            alert('Name updated!');
            switchTab('game');
        }
    }

    function openModal() { document.getElementById('betModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
    function closeModal() { document.getElementById('betModal').style.display='none'; document.getElementById('overlay').style.display='none'; }
</script>
</body>
</html>
