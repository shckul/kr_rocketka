<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket X Compact</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --acc: #00ff41; --btn: #222; --txt: #eee; }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--txt); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Компактная шапка */
        header { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--card); border-bottom: 1px solid #222; font-size: 14px; }
        .bal { color: var(--acc); font-weight: bold; }
        .h-list { display: flex; gap: 4px; padding: 5px 10px; background: #050505; overflow-x: auto; border-bottom: 1px solid #111; min-height: 20px; }
        .h-item { font-size: 10px; padding: 2px 6px; background: #1a1a1a; border-radius: 3px; color: #888; }

        /* Игровое поле */
        .vp { position: relative; flex: 1; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        #mult { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; font-weight: 900; z-index: 10; pointer-events: none; }
        
        /* Список игроков - супер компактный */
        .p-box { height: 80px; overflow-y: auto; font-size: 11px; padding: 5px 12px; background: #080808; border-top: 1px solid #111; }
        .p-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #151515; }

        /* Контролы - все в одну линию для экономии места */
        .ctrls { background: var(--card); padding: 10px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #222; }
        .in-row { display: flex; gap: 8px; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 5px; flex: 1; font-size: 14px; }
        .go-btn { padding: 12px; border-radius: 6px; border: none; font-weight: bold; font-size: 1rem; background: var(--acc); color: #000; cursor: pointer; text-transform: uppercase; }
        .go-btn:disabled { background: #333; color: #666; }
        .go-win { background: #ffaa00; }

        /* Модалки */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #151515; padding: 15px; border-radius: 10px; border: 1px solid #333; z-index: 100; width: 70%; }
        .ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 90; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleM('p')">👤 <span id="n-disp">Pilot</span></div>
    <div onclick="toggleM('s')">⚙️</div>
    <div class="bal"><span id="b-val">1000</span> ₽</div>
</header>

<div id="h-box" class="h-list"></div>

<div class="vp">
    <canvas id="c"></canvas>
    <div id="mult">1.00x</div>
</div>

<div class="p-box" id="p-list"></div>

<div class="ctrls">
    <div class="in-row">
        <input type="number" id="i-bet" value="100" placeholder="Ставка">
        <input type="number" id="i-auto" placeholder="Авто x">
    </div>
    <button id="btn" class="go-btn">ПОСТАВИТЬ</button>
</div>

<div class="ov" id="ov" onclick="toggleM()"></div>
<div class="modal" id="m-p">
    <h4 style="margin:0 0 10px">Профиль</h4>
    <input type="text" id="i-nick" placeholder="Новый ник" style="width:90%">
    <button class="go-btn" style="width:100%; margin-top:10px" onclick="saveP()">ОК</button>
</div>

<div class="modal" id="m-s">
    <h4 style="margin:0 0 10px">Настройки</h4>
    <div style="font-size:12px; margin-bottom:10px"><input type="checkbox" checked> Звук</div>
    <div style="font-size:12px; margin-bottom:10px"><input type="checkbox" checked id="c-grid"> Сетка</div>
    <button class="go-btn" style="width:100%" onclick="toggleM()">ЗАКРЫТЬ</button>
</div>

<script>
    const socket = io();
    const canv = document.getElementById('c'), ctx = canv.getContext('2d');
    const bBtn = document.getElementById('btn'), mVal = document.getElementById('mult');
    
    let st = 'WAIT', mult = 1.00, bal = 1000.0, nick = localStorage.getItem('n') || "User"+Math.floor(Math.random()*99);
    let stars = [], trail = [];

    // Инициализация
    document.getElementById('b-val').innerText = bal.toFixed(0);
    document.getElementById('n-disp').innerText = nick;
    socket.emit('join', { name: nick });

    function toggleM(t) {
        document.getElementById('ov').style.display = t ? 'block' : 'none';
        if(t==='p') document.getElementById('m-p').style.display = 'block';
        if(t==='s') document.getElementById('m-s').style.display = 'block';
        if(!t) document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    function saveP() {
        nick = document.getElementById('i-nick').value || nick;
        localStorage.setItem('n', nick);
        document.getElementById('n-disp').innerText = nick;
        socket.emit('join', { name: nick });
        toggleM();
    }

    function res() { 
        canv.width = canv.offsetWidth; canv.height = canv.offsetHeight;
        stars = []; for(let i=0; i<40; i++) stars.push({x:Math.random()*canv.width, y:Math.random()*canv.height, s:Math.random()*1.5});
    }
    window.onresize = res; res();

    function draw(m) {
        ctx.clearRect(0,0,canv.width, canv.height);
        if(document.getElementById('c-grid').checked) {
            ctx.strokeStyle = '#111'; ctx.lineWidth = 0.5;
            for(let i=0; i<canv.width; i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canv.height); ctx.stroke(); }
            for(let i=0; i<canv.height; i+=30) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canv.width,i); ctx.stroke(); }
        }
        stars.forEach(s => {
            s.y += (st === 'FLY' ? m*0.5 : 0.2); if(s.y > canv.height) s.y = 0;
            ctx.fillStyle = '#333'; ctx.fillRect(s.x, s.y, s.s, s.s);
        });

        if(st !== 'FLY') return;
        let p = Math.min((m - 1) / 5, 1);
        let x = 40 + p * (canv.width - 80), y = canv.height - 40 - p * (canv.height - 80);
        trail.push({x,y}); if(trail.length > 20) trail.shift();
        ctx.strokeStyle = 'rgba(0,255,65,0.2)'; ctx.lineWidth = 2;
        ctx.beginPath(); trail.forEach((pt,i) => { if(i===0) ctx.moveTo(pt.x,pt.y); else ctx.lineTo(pt.x,pt.y); }); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill(); // Упрощенная ракета-точка
    }

    socket.on('gameState', (d) => {
        st = d.state;
        if(st === 'WAIT') {
            mult = 1.0; trail = []; mVal.innerText = '1.00x'; mVal.style.color = '#fff';
            bBtn.innerText = 'ПОСТАВИТЬ'; bBtn.className = 'go-btn'; bBtn.disabled = false;
            document.getElementById('p-list').innerHTML = '';
        }
        if(st === 'CRASH') {
            mVal.innerText = 'CRASH ' + d.multiplier + 'x'; mVal.style.color = '#ff3e3e';
            bBtn.disabled = true;
            if(d.history) {
                document.getElementById('h-box').innerHTML = d.history.slice(0,10).map(v => `<div class="h-item">${v}x</div>`).join('');
            }
        }
    });

    socket.on('tick', (d) => {
        if(d.multiplier && st === 'FLY') {
            mult = parseFloat(d.multiplier);
            mVal.innerText = mult.toFixed(2) + 'x';
            draw(mult);
            if(bBtn.innerText === 'СТАВКА...') {
                bBtn.disabled = false; bBtn.className = 'go-btn go-win'; bBtn.innerText = 'ЗАБРАТЬ ' + (document.getElementById('i-bet').value * mult).toFixed(0);
            }
        }
        if(st === 'WAIT' && d.timer) bBtn.innerText = 'ЖДЕМ ' + d.timer;
    });

    bBtn.onclick = () => {
        const amt = parseFloat(document.getElementById('i-bet').value);
        if(st === 'WAIT') {
            if(bal < amt) return;
            bal -= amt; document.getElementById('b-val').innerText = bal.toFixed(0);
            socket.emit('placeBet', { bet: amt, name: nick });
            bBtn.innerText = 'СТАВКА...'; bBtn.disabled = true;
        } else if(st === 'FLY') {
            bal += (amt * mult); document.getElementById('b-val').innerText = bal.toFixed(0);
            socket.emit('cashOut');
            bBtn.innerText = 'OK!'; bBtn.disabled = true;
        }
    };

    socket.on('playerAction', (d) => {
        const pl = document.getElementById('p-list');
        if(d.type === 'bet') pl.innerHTML += `<div class="p-row"><span>👤 ${d.name}</span><span>${d.bet} ₽</span></div>`;
    });

    setInterval(() => { if(st !== 'FLY') draw(1); }, 60);
</script>
</body>
</html>
